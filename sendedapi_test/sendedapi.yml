- name: Sendedapi_linux 
  hosts: hospital_linux
  gather_facts: false 
  ignore_errors: yes
  become: yes
  vars:
    archive_linux: "SendedAPIDeployLinux.zip"
  tasks:  
  - name: Get the archive from Master
    win_copy:
      src: "{{ dest_sendedapi }}{{ archive_linux }}"
      dest: "{{sendedapi}}/"
    register: copy_result
      
  - name: Stopped service sendedapi
    ansible.builtin.service:
      name: sendedapi.service
      state: stopped
      
  - name: Unpacking the archive
    ansible.builtin.unarchive:
      src: "{{sendedapi}}/{{ archive_linux }}"
      dest: "{{sendedapi}}"
      remote_src: yes  # Архив находится на целевом хосте
      keep_newer: yes
    
  - name: Deleting an archive after unpacking
    ansible.builtin.file:
      path: "{{ sendedapi }}/{{ archive_linux }}"
      state: absent
    
  - name: Give permissions to run the file (chmod +x)
    ansible.builtin.file:
      path: "{{sendedapi}}/SendedAPI"
      mode: "0755"  # Владелец: rwx (7), группа: r-x (5), остальные: r-x (5)
      state: file
    
  - name: started service sendedapi
    ansible.builtin.service:
      name: sendedapi.service
      state: started
      
- name: Send message to Telegram
  hosts: local
  gather_facts: yes
  tasks:
    - name: Call version API
      uri:
        url: "{{ check_ver_sendedapi }"
        method: GET
        return_content: yes
      register: api_result
      
    - name: Prepare message
      set_fact:
        telegram_message: |
          Модуль #sendedapi обновлен ✅
          Версия: {{ api_result.content }}
          
    - name: Send message
      uri:
        url: "https://api.telegram.org/{{ token_tg }}/sendMessage"
        method: POST
        body_format: json
        body:
          chat_id: "{{ chat_id_tg }}" #ID чата Ansible VSD
          text: "{{ telegram_message }}"
          parse_mode: "HTML"
      run_once: true
      tags:
      - skip_message