---
- name: Master
  hosts: local
  gather_facts: false
  vars:
    archive: "SendedAPIDeploy.zip"
    archive_linux: "SendedAPIDeployLinux.zip"
  tasks:
  - name: Download SendedAPIDeploy from FTP to Master
    get_url:
      url: "{{ftp_url_master_releases}}{{ archive }}"
      dest: "{{ dest_sendedapi }}{{ archive }}"
      
  - name: Download SendedAPIDeployLinux from FTP to Master
    get_url:
      url: "{{ftp_url_master_releases}}{{ archive_linux }}"
      dest: "{{ dest_sendedapi }}{{ archive_linux }}"

- name: Sendedapi_Master_IIS 
  hosts: hospital
  gather_facts: false #пропускаем ping всех машин.
  ignore_errors: yes #если произойдет ошибка во время выполнения задания, то остановки не будет.
  strategy: free
  vars:
    archive: "SendedAPIDeploy.zip"
  tasks: 
  - name: Get the archive from Master
    win_copy:
      src: "{{ dest_sendedapi }}{{ archive }}"
      dest: "{{sendedapi}}/" 
        
  - name: Stopping the IIS pool
    win_iis_webapppool:
      name: sendedapi
      state: stopped
      
  - name: KILL SQLITESTUDIO
    win_command: taskkill /IM sqlitestudio.exe /F
      
  - name: Unpacking an archive and then deleting it
    win_unzip:
      src: "{{sendedapi}}/{{ archive }}"
      dest: "{{sendedapi}}/"
      delete_archive: yes
    retries: 10
    delay: 2
    register: result
    until: result is not failed 
      
  - name: Running a script for database changes
    win_shell: "{{sendedapi}}/sql/script.bat"
    args:
      chdir: "{{sendedapi}}/sql"
      
  - name: Starting the IIS pool
    win_iis_webapppool:
      name: sendedapi
      state: started 
             
- name: Sendedapi_Master_service 
  hosts: hospital_service
  gather_facts: false 
  ignore_errors: yes 
  strategy: free
  vars:
    archive: "SendedAPIDeploy.zip"
  tasks:  
  - name: Get the archive from Master
    win_copy:
      src: "{{ dest_sendedapi }}{{ archive }}"
      dest: "{{sendedapi}}/"
    register: copy_result
     
  - name: Get the archive from FTP if Master failed
    win_get_url:
      url: "{{ ftp_url_releases }}{{ archive }}"
      dest: "{{sendedapi}}/" 
      url_username: "{{ ftp_username }}"
      url_password: "{{ ftp_password }}"
    when: copy_result is failed      
      
  - name: Service stop
    win_service:
      name: "{{ service_name | default('sendedapi') }}"
      state: stopped      
    
  - name: KILL SQLITESTUDIO
    win_command: taskkill /IM sqlitestudio.exe /F
          
  - name: Unpacking an archive and then deleting it
    win_unzip:
      src: "{{sendedapi}}/{{ archive }}"
      dest: "{{sendedapi}}"
      delete_archive: yes
    retries: 10
    delay: 2
    register: result
    until: result is not failed 
      
  - name: Running a script for database changes
    win_shell: "{{sendedapi}}/sql/script.bat"
    args:
      chdir: "{{sendedapi}}/sql"
  
  - name: Service startup
    win_service:
      name: "{{ service_name | default('sendedapi') }}"
      state: started

